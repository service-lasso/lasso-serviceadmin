name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
            artifact: dist/@serviceadmin-win32.zip
          - os: ubuntu-latest
            platform: linux
            artifact: dist/@serviceadmin-linux.tar.gz
          - os: macos-14
            platform: darwin
            artifact: dist/@serviceadmin-darwin.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\package.ps1

      - name: Package artifact (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: bash ./scripts/package.sh

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          generate_release_notes: true

      - name: Upload packaged artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: @serviceadmin-${{ matrix.platform }}
          path: ${{ matrix.artifact }}
