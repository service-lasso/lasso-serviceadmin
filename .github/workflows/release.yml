name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
            artifact: dist/@serviceadmin-win32.zip
          - os: ubuntu-latest
            platform: linux
            artifact: dist/@serviceadmin-linux.tar.gz
          - os: macos-14
            platform: darwin
            artifact: dist/@serviceadmin-darwin.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        shell: bash
        run: npm ci --legacy-peer-deps

      - name: Run unit tests
        shell: bash
        run: npm run test:unit

      - name: Build app
        shell: bash
        run: npm run build

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\package.ps1

      - name: Package artifact (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: bash ./scripts/package.sh

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: serviceadmin-${{ matrix.platform }}
          path: ${{ matrix.artifact }}

  browser-e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        shell: bash
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browser
        shell: bash
        run: npx playwright install --with-deps chromium

      - name: Run browser UI tests
        shell: bash
        run: npm run test:ui

  release:
    needs:
      - build
      - browser-e2e
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: serviceadmin-*
          merge-multiple: true

      - name: Copy service manifest into release assets
        shell: bash
        run: |
          set -euo pipefail
          cp service.json release-assets/service.json

      - name: Generate release checksums
        shell: bash
        run: |
          set -euo pipefail
          (
            cd release-assets
            sha256sum \
              @serviceadmin-win32.zip \
              @serviceadmin-linux.tar.gz \
              @serviceadmin-darwin.tar.gz \
              service.json > SHA256SUMS.txt
          )

      - name: Compute release version
        id: version
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          version="$(date -u +%Y.%-m.%-d)-${short_sha}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: |
            release-assets/@serviceadmin-win32.zip
            release-assets/@serviceadmin-linux.tar.gz
            release-assets/@serviceadmin-darwin.tar.gz
            release-assets/service.json
            release-assets/SHA256SUMS.txt
          generate_release_notes: true
